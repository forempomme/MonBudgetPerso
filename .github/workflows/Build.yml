name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Dépendances ───────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Build React ───────────────────────────────────────────
      - name: Build web app
        run: npm run build

      # ── 7. Capacitor — init + android + sync ─────────────────────
      - name: Capacitor init
        run: |
          npx cap init "Budget Pro 2026" "com.budgetpro.app" \
            --web-dir dist \
            2>&1 || true

      - name: Capacitor add android
        run: |
          npx cap add android 2>&1 || true

      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Keystore — décodage depuis GitHub Secrets ─────────────
      # Le keystore est stocké en base64 dans KEYSTORE_BASE64.
      # On le décode ici pour que Gradle puisse signer le release APK
      # avec une clé stable à chaque build (fix de la signature changeante).
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/budgetpro.keystore

      # ── 9. Permissions Gradle ────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build APK release signé ──────────────────────────────
      # On passe la config de signature directement à Gradle via -P.
      # Pas besoin de modifier build.gradle : l'Android Gradle Plugin
      # accepte ces propriétés nativement pour assembleRelease.
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/budgetpro.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # ── 11. Renommer l'APK ───────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk \
             output/BudgetPro2026.apk

      # ── 12. Upload artifact ──────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BudgetPro2026
          path: output/BudgetPro2026.apk
          retention-days: 30
          
