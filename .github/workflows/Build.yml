name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Dépendances ───────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Build React ───────────────────────────────────────────
      - name: Build web app
        run: npm run build

      # ── 7. Capacitor — init + android + sync ─────────────────────
      - name: Capacitor init
        run: |
          npx cap init "Gestion du budget" "com.gestionbudget.app" \
            --web-dir dist \
            2>&1 || true

      - name: Capacitor add android
        run: |
          npx cap add android 2>&1 || true

      - name: Capacitor sync
        run: npx cap sync android

      # ── 7b. Fix Maven Central 403 via Gradle init script ─────────
      # repo.maven.apache.org retourne 403 depuis GitHub Actions.
      # On utilise un init script global qui ajoute repo1.maven.org
      # (le vrai Maven Central) SANS toucher au settings.gradle de
      # Capacitor (ce qui cassait l'include :capacitor-android).
      - name: Fix Maven repositories
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/maven-mirror.init.gradle << 'GRADLE'
          allprojects {
            buildscript {
              repositories {
                maven { url = uri("https://repo1.maven.org/maven2/") }
                maven { url = uri("https://dl.google.com/dl/android/maven2/") }
                gradlePluginPortal()
              }
            }
            repositories {
              maven { url = uri("https://repo1.maven.org/maven2/") }
              maven { url = uri("https://dl.google.com/dl/android/maven2/") }
            }
          }
          GRADLE

      # ── 7c. Injection des icônes ─────────────────────────────────
      - name: Inject app icons
        run: |
          SRC="assets/android-icons"
          DEST="android/app/src/main/res"

          echo "=== Avant injection ==="
          find "$DEST" -name "ic_launcher*" | sort

          find "$DEST" -type d -name "mipmap-anydpi*" -exec rm -rf {} + 2>/dev/null || true
          find "$DEST" -name "ic_launcher*.xml" -delete 2>/dev/null || true

          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$DEST/$dir"
            rm -f "$DEST/$dir/ic_launcher*.webp"
            rm -f "$DEST/$dir/ic_launcher*.png"
            cp "$SRC/$dir/ic_launcher.png"       "$DEST/$dir/ic_launcher.png"
            cp "$SRC/$dir/ic_launcher_round.png" "$DEST/$dir/ic_launcher_round.png"
            echo "OK $dir"
          done

          echo "=== Après injection ==="
          find "$DEST" -name "ic_launcher*" | sort

      # ── 8. Keystore ──────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/budgetpro.keystore

      # ── 9. Permissions Gradle ────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build APK release signé ──────────────────────────────
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/budgetpro.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # ── 11. Renommer l'APK ───────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk \
             output/GestionBudget-v${VERSION}.apk

      # ── 12. Upload artifact ──────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GestionBudget
          path: output/GestionBudget-v*.apk
          retention-days: 30
