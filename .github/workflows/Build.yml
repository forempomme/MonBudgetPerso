name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Dépendances ───────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Build React ───────────────────────────────────────────
      - name: Build web app
        run: npm run build

      # ── 7. Capacitor — init + android + sync ─────────────────────
      - name: Capacitor init
        run: |
          npx cap init "Gestion du budget" "com.gestionbudget.app" \
            --web-dir dist \
            2>&1 || true

      - name: Capacitor add android
        run: |
          npx cap add android 2>&1 || true

      - name: Capacitor sync
        run: npx cap sync android

      # ── 7b. Injection des icônes ─────────────────────────────────
      # Les icônes sont versionnées dans assets/android-icons/.
      # On supprime mipmap-anydpi-v26/ (icônes adaptatives XML générées
      # par Capacitor qui écrasent nos PNG sur Android 8+), puis on
      # copie nos PNG dans chaque dossier mipmap.
      - name: Inject app icons
        run: |
          SRC="assets/android-icons"
          DEST="android/app/src/main/res"

          # Supprime les icônes adaptatives XML — elles ont priorité sur les PNG
          rm -rf "$DEST/mipmap-anydpi-v26"
          rm -rf "$DEST/mipmap-anydpi-v31"

          # Copie nos PNG dans chaque dossier mipmap
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$DEST/$dir"
            # Supprime les éventuels .webp générés par Capacitor
            rm -f "$DEST/$dir/"*.webp
            cp "$SRC/$dir/"*.png "$DEST/$dir/"
          done

          echo "✅ Icons injected"
          ls "$DEST/mipmap-xxhdpi/"

      # ── 8. Keystore — décodage depuis GitHub Secrets ─────────────
      # Le keystore est stocké en base64 dans KEYSTORE_BASE64.
      # On le décode ici pour que Gradle puisse signer le release APK
      # avec une clé stable à chaque build (fix de la signature changeante).
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/budgetpro.keystore

      # ── 9. Permissions Gradle ────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build APK release signé ──────────────────────────────
      # On passe la config de signature directement à Gradle via -P.
      # Pas besoin de modifier build.gradle : l'Android Gradle Plugin
      # accepte ces propriétés nativement pour assembleRelease.
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/budgetpro.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # ── 11. Renommer l'APK avec numéro de version ────────────────
      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk \
             output/GestionBudget-v${VERSION}.apk

      # ── 12. Upload artifact ──────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GestionBudget
          path: output/GestionBudget-v*.apk
          retention-days: 30
