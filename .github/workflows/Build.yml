name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Dépendances ───────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Build React ───────────────────────────────────────────
      - name: Build web app
        run: npm run build

      # ── 7. Capacitor — init + android + sync ─────────────────────
      # Cap init peut échouer silencieusement si déjà fait, on force --no-input
      - name: Capacitor init
        run: |
          npx cap init "Budget Pro 2026" "com.budgetpro.app" \
            --web-dir dist \
            2>&1 || true

      - name: Capacitor add android
        run: |
          npx cap add android 2>&1 || true

      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Permissions Gradle ────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Build APK debug ───────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 10. Renommer l'APK ───────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             output/BudgetPro2026-debug.apk

      # ── 11. Upload artifact ──────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BudgetPro2026-debug
          path: output/BudgetPro2026-debug.apk
          retention-days: 30
          
